version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rd_postgres
    environment:
      POSTGRES_DB:       ride_dispatcher
      POSTGRES_USER:     rd_user
      POSTGRES_PASSWORD: rd_password_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rd_user -d ride_dispatcher']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rd_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # ── Backend API (Node.js / Express) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rd_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT:                    5000
      NODE_ENV:                development
      DATABASE_URL:            postgresql://rd_user:rd_password_dev@postgres:5432/ride_dispatcher
      JWT_SECRET:              dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET:      dev_refresh_secret_change_in_production
      JWT_EXPIRES_IN:          7d
      JWT_REFRESH_EXPIRES_IN:  30d
      AI_SERVICE_URL:          http://ai-service:8000
      CORS_ORIGIN:             http://localhost:5173
      FRONTEND_URL:            http://localhost:5173
    ports:
      - '5000:5000'
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  # ── AI/ML Service (Python / FastAPI) ─────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: rd_ai
    environment:
      PORT: 8000
      MODEL_DIR: /app/trained_models
    ports:
      - '8000:8000'
    volumes:
      - ai_models:/app/trained_models
    restart: unless-stopped

  # ── Frontend Dev Server ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rd_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - '5173:5173'
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rd_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ai_models:
